<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./style.css">
  <title>Paleta de Cores</title>
</head>
<body>
  <div class="container">
    <h1 class="title"> Gerador de Paleta </h1>
    <button id="btn-gen">
      <i class="fas fa-sync-alt"></i>
      Gera Paleta
    </button>

    <div class="palette-container">
      <!-- Box 1 -->
       <div class="color-box">
        <div class="color" style="background-color: #0000ff;"></div>
        <div class="color-info">
          <span class="hex-value">#0000ff</span>
          <i class="fa-regular fa-copy copy-btn" title="Copiar cor"></i>
        </div>
       </div>
      <!-- Box 2 -->
       <div class="color-box">
        <div class="color" style="background-color: #560b58;"></div>
        <div class="color-info">
          <span class="hex-value">#560b58</span>
          <i class="fa-regular fa-copy copy-btn" title="Copiar cor"></i>
        </div>
       </div>
      <!-- Box 3 -->
       <div class="color-box">
        <div class="color" style="background-color: #15151d;"></div>
        <div class="color-info">
          <span class="hex-value">#15151d</span>
          <i class="fa-regular fa-copy copy-btn" title="Copiar cor"></i>
        </div>
       </div>
      <!-- Box 4 -->
       <div class="color-box">
        <div class="color" style="background-color: #3fc746;"></div>
        <div class="color-info">
          <span class="hex-value">#3fc746</span>
          <i class="fa-regular fa-copy copy-btn" title="Copiar cor"></i>
        </div>
       </div>
      <!-- Box 5 -->
       <div class="color-box">
        <div class="color" style="background-color: #d3dd3f;"></div>
        <div class="color-info">
          <span class="hex-value">#d3dd3f</span>
          <i class="fa-regular fa-copy copy-btn" title="Copiar cor"></i>
        </div>
       </div>
    </div>
  </div>


  <script type="module" src="./script.js"></script>
</body>
</html>
